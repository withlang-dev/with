name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: zig build test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm --no-progress --yes

      - name: Export LLVM_PREFIX (Linux)
        if: runner.os == 'Linux'
        run: echo "LLVM_PREFIX=$(llvm-config --prefix)" >> "$GITHUB_ENV"

      - name: Export LLVM_PREFIX (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - name: Export LLVM_PREFIX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LLVM_PREFIX=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run unit tests
        run: zig build test

