name: CI

on:
  push:
  pull_request:

jobs:
  selfhost-macos:
    name: selfhost (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Export LLVM_PREFIX
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - name: Build
        run: make build

      - name: Fixpoint
        run: make fixpoint

      - name: Test
        run: make test
